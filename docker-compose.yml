services:
  db:
    image: postgres:17
    container_name: found404-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-found404}
      POSTGRES_USER: ${POSTGRES_USER:-found404}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-found404}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: found404-delivery-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-found404}
      POSTGRES_USER: ${POSTGRES_USER:-found404}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-found404}
      TZ: Asia/Seoul
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
