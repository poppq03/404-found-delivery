spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${POSTGRES_DB:delivery_db}
    username: ${POSTGRES_USER:found404}
    password: ${POSTGRES_PASSWORD:found404}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
