name: CD

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile
        run: ./gradlew compileJava --no-daemon

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh

          if [ -z "${{ secrets.EC2_SSH_KEY_B64 }}" ]; then
            echo "EC2_SSH_KEY_B64 secret is empty or missing"
            exit 1
          fi

          printf '%s' "${{ secrets.EC2_SSH_KEY_B64 }}" | tr -d '[:space:]' | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/ec2_key || (echo "Decoded key is missing BEGIN PRIVATE KEY header" && exit 1)
          grep -q "END .*PRIVATE KEY" ~/.ssh/ec2_key || (echo "Decoded key is missing END PRIVATE KEY footer" && exit 1)
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
          set -euo pipefail

          cd /home/ec2-user/404-found-delivery
          git checkout develop
          git pull --ff-only origin develop

          docker compose -f docker-compose.prod.yml --env-file .env up -d --build
          docker image prune -f
          docker compose -f docker-compose.prod.yml --env-file .env ps
          EOF
